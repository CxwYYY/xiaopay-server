server:
  port: 18080

spring:
  application:
    name: xiaopay-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${XIAOPAY_DB_URL:jdbc:mysql://127.0.0.1:3306/xiaopay?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${XIAOPAY_DB_USERNAME:root}
    password: ${XIAOPAY_DB_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  data:
    redis:
      host: ${XIAOPAY_REDIS_HOST:127.0.0.1}
      port: ${XIAOPAY_REDIS_PORT:6379}
      password: ${XIAOPAY_REDIS_PASSWORD:}
      database: ${XIAOPAY_REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

sa-token:
  token-name: xiaopay-token
  timeout: ${XIAOPAY_ADMIN_TOKEN_TIMEOUT:86400}
  active-timeout: ${XIAOPAY_ADMIN_ACTIVE_TIMEOUT:7200}
  is-concurrent: false
  is-share: false
  token-style: random-64
  is-log: false

xiaopay:
  security:
    signature-window-seconds: ${XIAOPAY_SIGNATURE_WINDOW_SECONDS:300}
    setup-token: ${XIAOPAY_SETUP_TOKEN:}
    login-max-failures: ${XIAOPAY_LOGIN_MAX_FAILURES:5}
    login-lock-minutes: ${XIAOPAY_LOGIN_LOCK_MINUTES:15}
    allowed-origins:
      - ${XIAOPAY_CONSOLE_ORIGIN:http://127.0.0.1:5176}
      - http://localhost:5176
      - http://127.0.0.1:5173
      - http://localhost:5173
      - http://127.0.0.1:5174
      - http://localhost:5174
      - http://127.0.0.1:5175
      - http://localhost:5175
  paynum:
    default-length: 4
    fallback-length: 5
    max-attempts: 20
  notify:
    fixed-delay-ms: 10000
